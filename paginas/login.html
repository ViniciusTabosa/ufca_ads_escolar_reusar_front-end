<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Escola Reusar</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/login-cadastro.css">
</head>

<body>

    <header>

        <div class="logo">

            <!-- LOGO DO PROJETO -->
            <img src="../imgs/logo.png" alt="Logo Escola Reusar">

            <h1>Escola Reusar</h1>

        </div>

        <nav>
            <ul>
                <li><a href="cadastro.html">Cadastrar</a></li>
                <li><a href="login.html">Login</a></li>
            </ul>
        </nav>

    </header>

    <main>

        <div class="container">

            <section class="formulario">

                <h2>Entrar na sua conta</h2>

                <p>Digite suas informações abaixo para fazer login.</p>

                <form action="lista-pedidos.html">

                    <label for="email">E-mail:</label>
                    <input type="email" id="email" placeholder="Digite seu e-mail">

                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" placeholder="Digite sua senha">

                    <button type="submit">Entrar</button>

                </form>

            </section>

            <aside class="ilustracao">

                <!-- ILUSTRAÇÃO DA TELA DE LOGIN -->
                <img src="../imgs/img_login.png">

            </aside>

        </div>

    </main>

    <footer>
        <p>Code by: PISociety</p>
    </footer>

    <script src="../js/script.js"></script>

</body>

</html>
