<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criação de Pedidos</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>

        <div class="logo">

            <!-- LOGO DO PROJETO -->
            <img src="../imgs/logo.png" alt="Logo Escola Reusar">

            <h1>Escola Reusar</h1>

        </div>

        <nav>
            <ul>
                <li><a href="lista-pedidos.html">Área de Pedidos</a></li>
                <li><a href="criacao-pedidos.html">Novo Pedido</a></li>
                <li><a href="meus-pedidos.html">Meus Pedidos</a></li>
                <li><a href="perfil.html">Meu Perfil</a></li>
                <li><a href="login.html">Sair</a></li>
            </ul>
        </nav>

    </header>


    <main class="bloco-pedidos">       
        <h1>Detalhes do pedido</h1> 
        <form action="" method="post">                

                <div class="campo-form">
                    <label for="titulo-pedido">Título do pedido:</label>
                    <input type="text" id="titulo-pedido" class="campo-entrada-titulo" placeholder="Título do pedido" readonly/>
                </div>

                <div class="campo-form">
                    <label for="titulo-pedido">Endereço:</label>
                    <input type="text" id="titulo-pedido" class="campo-entrada-titulo" placeholder="Endereço de doação" readonly/>
                </div>

                <div class="campo-form">
                    <label for="descricao-pedido">Descrição do pedido:</label>
                    <textarea class="campo-entrada-textarea" readonly>Descrição do pedido</textarea>     
                </div>           

                <div class="campo-form">
                    <label for="lista-materiais">Lista de materiais:</label>
                    <textarea class="campo-entrada-textarea" readonly>Materiais solicitados</textarea>                
                </div>    



                <div class="campo-form">
                    <span class="titulo-campo">Imagens referencia</span>
                    <label for="upload-image" class="caixa-dropzone">
                        
                        <p class="text-upload-image">Imagens</p>
                    </label>                
                </div>    

                <div class="alinhamento-botoes">                    
                    <button class="btn-publicar" type="submit">Voltar</button>   
                    <button class="btn-publicar" type="submit">Entrar em contato</button>   
                </div>
                  
        </form>   

    </main>   
</body>

    <footer>
        <p>Code by: <a href="https://github.com/ViniciusTabosa/ufca_ads_escolar_reusar_front-end" target="_blank">PISociety</a></p>
    </footer>
</html>
