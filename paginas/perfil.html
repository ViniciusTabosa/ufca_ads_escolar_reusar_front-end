<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perfil</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/principal.css">
</head>
<body>
  <header>
    <div class="logo">
      <img src="../imgs/logo.png" alt="Logo Escola Reusar">
      <h1>Escola Reusar</h1>
    </div>
    <nav class="menu-logado">
      <ul>
        <li><a href="lista-pedidos.html">Área de pedidos</a></li>
        <li><a href="criacao-pedido.html">Novo pedido</a></li>
        <li><a href="meus-pedidos.html">Meus pedidos</a></li>
        <li><a class="ativo" href="perfil.html">Meu perfil</a></li>
        <li><a href="../index.html">Sair</a></li>
      </ul>
    </nav>
  </header>

  <main class="conteudo-perfil">
    <section class="info-perfil">
      <div class="imagem-perfil">
        <img src="../imgs/foto-usuario.png" alt="Foto do usuário">
        <button>Alterar imagem</button>
      </div>
      <div class="detalhes-perfil">
        <form action="./" method="post">
          <label for="inp-nome">Nome </label>
          <input type="text" id="inp-nome">
          <label for="inp-email">E-mail</label>
          <input type="text" id="inp-email">
          <label for="inp-senha">Senha</label>
          <input type="text" id="inp-senha">
          <label for="inp-confirm">Confirmar senha</label>
          <input type="text" id="inp-confirm">
        </form>
      </div>
    </section>
    <button>Salvar</button>
  </main>

  <footer>
    <p>Code by: PISociety</p>
  </footer>
</body>
</html>
